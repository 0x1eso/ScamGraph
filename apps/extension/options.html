<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ScamGraph 방패 · 설정</title>
    <link rel="stylesheet" href="ui.css" />
    <style>
      body { min-height: 100vh; }
      .wrap { max-width: 640px; margin: 0 auto; padding: 40px 24px 64px; }
      header { margin-bottom: 32px; }
      .kicker { font: 700 11px/1 var(--mono); letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
      h1 { margin: 10px 0 6px; font-size: 26px; letter-spacing: -0.02em; }
      header p { color: var(--text-dim); font-size: 14px; }
      section {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px;
        margin-bottom: 20px;
        background: var(--bg-card);
      }
      section h2 { font-size: 15px; margin-bottom: 4px; }
      section .desc { color: var(--text-dim); font-size: 13px; margin-bottom: 16px; }
      .levels { display: flex; flex-direction: column; gap: 10px; }
      .level {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 10px;
        cursor: pointer;
        transition: border-color 0.16s var(--ease), background 0.16s var(--ease);
      }
      .level:hover { border-color: #2a3346; }
      .level input { margin-top: 3px; accent-color: var(--accent); }
      .level .t { font-weight: 600; }
      .level .s { color: var(--text-mute); font-size: 12.5px; margin-top: 2px; }
      .level.sel { border-color: var(--accent); background: rgba(0, 229, 192, 0.05); }
      .addrow { display: flex; gap: 8px; margin-bottom: 14px; }
      input[type="text"] {
        flex: 1;
        background: var(--bg-elev);
        border: 1px solid var(--line);
        border-radius: 10px;
        color: var(--text);
        font: 500 13px/1.4 var(--mono);
        padding: 10px 12px;
      }
      input[type="text"]:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
      .list { display: flex; flex-direction: column; gap: 8px; }
      .item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--bg-elev);
      }
      .item .d { font: 600 12.5px/1.3 var(--mono); word-break: break-all; }
      .item button { background: transparent; border: none; color: var(--danger); cursor: pointer; font-size: 12px; font-weight: 600; }
      .empty { color: var(--text-mute); font-size: 13px; padding: 6px 2px; }
      .toggle { display: flex; align-items: center; gap: 12px; }
      .toggle input { width: 18px; height: 18px; accent-color: var(--accent); }
      .toggle .t { font-weight: 600; }
      .toggle .s { color: var(--text-mute); font-size: 12.5px; }
      #saved { color: var(--accent); font-size: 12px; opacity: 0; transition: opacity 0.2s; }
      #saved.show { opacity: 1; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="kicker">ScamGraph 방패 · 설정</div>
        <h1>보호 설정</h1>
        <p>이 확장은 방문 주소를 서버로 보내지 않습니다. 차단은 로컬 블록리스트로 이뤄집니다.</p>
      </header>

      <section>
        <h2>보호 수준</h2>
        <div class="desc">얼마나 적극적으로 개입할지 선택합니다.</div>
        <div class="levels" id="levels">
          <label class="level" data-level="standard">
            <input type="radio" name="level" value="standard" />
            <span>
              <span class="t">표준 <span class="muted">(권장)</span></span>
              <div class="s">차단 목록 도메인을 접속 차단 · 링크 호버 경고 · 자격증명 폼 가드.</div>
            </span>
          </label>
          <label class="level" data-level="strict">
            <input type="radio" name="level" value="strict" />
            <span>
              <span class="t">엄격</span>
              <div class="s">표준 + '주의' 수준 휴리스틱까지 호버 툴팁으로 표시.</div>
            </span>
          </label>
          <label class="level" data-level="monitor">
            <input type="radio" name="level" value="monitor" />
            <span>
              <span class="t">모니터만</span>
              <div class="s">접속을 차단하지 않고 경고만 표시(툴팁·폼 가드 유지).</div>
            </span>
          </label>
        </div>
      </section>

      <section>
        <h2>개인 허용목록</h2>
        <div class="desc">여기에 추가한 도메인은 차단하지 않습니다(오탐 예외 처리).</div>
        <div class="addrow">
          <input type="text" id="allowInput" placeholder="예: example.com" autocomplete="off" spellcheck="false" />
          <button class="btn primary" id="addAllow">추가</button>
        </div>
        <div class="list" id="allowList"></div>
      </section>

      <section>
        <h2>익명 통계 공유</h2>
        <div class="desc">기본 꺼짐. 켜도 방문 주소는 전송되지 않으며, 익명 차단 통계만 공유합니다.</div>
        <label class="toggle">
          <input type="checkbox" id="telemetry" />
          <span>
            <span class="t">익명 통계 공유 허용</span>
            <div class="s">개인정보 보호를 위해 기본값은 꺼짐입니다.</div>
          </span>
        </label>
      </section>

      <div id="saved">저장됨 ✓</div>
    </div>

    <script src="lib/heuristics.js"></script>
    <script src="options.js"></script>
  </body>
</html>
