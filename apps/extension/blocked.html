<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ScamGraph — 차단됨</title>
<link rel="stylesheet" href="ui.css" />
<style>
  html, body { height: 100%; }
  body {
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(255, 77, 109, 0.14), transparent 60%),
      var(--bg);
    background-image:
      radial-gradient(1200px 600px at 50% -10%, rgba(255, 77, 109, 0.14), transparent 60%),
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: auto, 48px 48px, 48px 48px;
  }
  .wrap {
    width: min(640px, 92vw);
    text-align: center;
    padding: 40px 32px;
  }
  .shield {
    font-size: 64px;
    line-height: 1;
    filter: drop-shadow(0 8px 24px rgba(255, 77, 109, 0.4));
  }
  .kicker {
    margin-top: 18px;
    font: 700 12px/1 var(--mono);
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--danger);
  }
  h1 {
    margin: 12px 0 6px;
    font-size: clamp(26px, 4vw, 40px);
    letter-spacing: -0.02em;
  }
  .domain {
    display: inline-block;
    margin: 8px 0 4px;
    padding: 10px 16px;
    border: 1px solid var(--danger);
    border-radius: 12px;
    background: rgba(255, 77, 109, 0.08);
    font: 700 16px/1.3 var(--mono);
    color: #fff;
    word-break: break-all;
  }
  .puny {
    font: 500 12px/1.4 var(--mono);
    color: var(--text-mute);
    margin-bottom: 8px;
  }
  .lead {
    color: var(--text-dim);
    font-size: 15px;
    max-width: 46ch;
    margin: 10px auto 22px;
  }
  .reasons {
    text-align: left;
    max-width: 420px;
    margin: 0 auto 26px;
    padding: 14px 16px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 12px;
  }
  .reasons h2 {
    font: 700 11px/1 var(--mono);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-mute);
    margin-bottom: 10px;
  }
  .reasons ul { margin: 0; padding-left: 18px; }
  .reasons li { margin: 6px 0; color: var(--text); }
  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .advanced {
    margin-top: 18px;
    font-size: 13px;
    color: var(--text-mute);
  }
  .advanced summary { cursor: pointer; }
  .advanced .panel {
    margin-top: 12px;
    padding: 14px;
    border: 1px dashed var(--line);
    border-radius: 10px;
  }
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--bg-card);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

<main class="wrap" role="alertdialog" aria-labelledby="title">
  <div class="shield" aria-hidden="true">🛡️</div>
  <div class="kicker">ScamGraph 방화벽 · 접속 차단</div>
  <h1 id="title">위험한 사이트를 막았습니다</h1>
  <div class="domain" id="domain">알 수 없는 도메인</div>
  <div class="puny" id="puny" hidden></div>
  <p class="lead">
    이 도메인은 사기·피싱 위협 목록에 등재되어 있습니다. 접속이 로컬에서
    차단되었으며, <b>방문 주소는 서버로 전송되지 않았습니다.</b>
  </p>

  <section class="reasons" aria-label="차단 근거">
    <h2>차단 근거</h2>
    <ul id="reasons"><li>위협 인텔리전스 목록 등재</li></ul>
  </section>

  <div class="actions">
    <button class="btn primary" id="back">← 안전하게 뒤로가기</button>
    <button class="btn ghost" id="report">오탐 신고</button>
  </div>

  <details class="advanced">
    <summary>고급 옵션</summary>
    <div class="panel">
      위험을 이해했고 계속 진행하려면 아래 버튼을 누르세요. 이 도메인은
      약 <b id="allowMins">10</b>분 동안만 일시적으로 허용됩니다.
      <div style="margin-top: 12px">
        <button class="btn danger" id="proceed">위험을 감수하고 계속</button>
      </div>
    </div>
  </details>
</main>

<div id="toast" role="status"></div>

<script src="lib/heuristics.js"></script>
<script src="blocked.js"></script>
