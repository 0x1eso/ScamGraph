<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>ScamGraph 방패</title>
    <link rel="stylesheet" href="ui.css" />
    <style>
      body { width: 340px; font-size: 13px; }
      .hd {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(0, 229, 192, 0.05), transparent);
      }
      .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; letter-spacing: 0.3px; }
      .brand .logo { font-size: 16px; }
      .brand b { color: var(--accent); }
      .body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
      .site {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        background: var(--bg-card);
      }
      .site .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      .site .host { font: 600 13px/1.35 var(--mono); word-break: break-all; color: var(--text); }
      .site .puny { font: 500 11px/1.4 var(--mono); color: var(--text-mute); margin-top: 4px; }
      .site .note { margin-top: 8px; color: var(--text-dim); font-size: 12px; }
      .actions { display: flex; gap: 8px; }
      .actions .btn { flex: 1; }
      .detail {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        background: var(--bg-elev);
        display: none;
      }
      .detail.show { display: block; }
      .detail .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
      .detail .score { font: 700 20px/1 var(--mono); }
      .detail .reco { margin: 8px 0; color: var(--text); font-size: 12.5px; line-height: 1.5; }
      .detail ul { list-style: none; display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
      .detail li {
        font-size: 12px;
        color: var(--text-dim);
        padding-left: 14px;
        position: relative;
      }
      .detail li::before { content: "\203A"; position: absolute; left: 0; color: var(--accent); }
      .meta {
        padding: 10px 14px;
        border-top: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        gap: 8px;
        font-size: 11.5px;
        color: var(--text-mute);
      }
      .meta .line { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      .meta .k { color: var(--text-mute); }
      .meta .v { color: var(--text-dim); font-family: var(--mono); }
      .meta .v.strong { color: var(--accent); }
      .foot { display: flex; gap: 8px; padding: 0 14px 14px; }
      .foot .btn { flex: 1; padding: 8px 10px; font-size: 12px; }
      .muted { color: var(--text-mute); }
    </style>
  </head>
  <body>
    <div class="hd">
      <div class="brand"><span class="logo">🛡️</span>Scam<b>Graph</b> 방패</div>
      <span class="pill unknown" id="levelPill"><span class="dot"></span><span id="levelText">보호</span></span>
    </div>

    <div class="body">
      <div class="site">
        <div class="row">
          <div class="host" id="host">현재 페이지 확인 중…</div>
          <span class="pill unknown" id="localPill"><span class="dot"></span><span id="localText">…</span></span>
        </div>
        <div class="puny" id="puny" hidden></div>
        <div class="note" id="note">로컬 블록리스트와 휴리스틱으로 즉시 판정합니다(오프라인 가능).</div>
      </div>

      <div class="actions">
        <button class="btn primary" id="inspect">이 페이지 상세검사</button>
        <button class="btn ghost" id="report">신고</button>
      </div>

      <div class="detail" id="detail" aria-live="polite">
        <div class="top">
          <span class="pill unknown" id="gradePill"><span class="dot"></span><span id="gradeText">판정</span></span>
          <span class="score muted" id="score">–</span>
        </div>
        <div class="reco" id="reco"></div>
        <ul id="reasons"></ul>
      </div>
    </div>

    <div class="meta">
      <div class="line"><span class="k">블록리스트</span><span class="v" id="blVersion">–</span></div>
      <div class="line"><span class="k">마지막 동기화</span><span class="v" id="blSync">–</span></div>
      <div class="line"><span class="k">오늘 차단</span><span class="v strong" id="blockedToday">0</span></div>
    </div>

    <div class="foot">
      <button class="btn ghost" id="sync">지금 동기화</button>
      <button class="btn ghost" id="panel">상세 패널</button>
      <button class="btn ghost" id="options">설정</button>
    </div>

    <script src="lib/heuristics.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
