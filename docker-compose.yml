name: scamgraph

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scamgraph
      POSTGRES_PASSWORD: scamgraph
      POSTGRES_DB: scamgraph
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scamgraph"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/scamgraph123
      NEO4J_PLUGINS: '["apoc"]'
    ports: ["7474:7474", "7687:7687"]
    volumes:
      - neo4jdata:/data
      - ./infra/neo4j:/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine

  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_MASTER_KEY: scamgraph_dev_key
      MEILI_NO_ANALYTICS: "true"
    ports: ["7700:7700"]
    volumes:
      - meilidata:/meili_data

  engine:
    build: ./apps/engine
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: scamgraph123
      MEILI_URL: http://meilisearch:7700
      MEILI_KEY: scamgraph_dev_key
      DATABASE_URL: postgresql://scamgraph:scamgraph@postgres:5432/scamgraph
      # 선택: 실제 위협 피드 키(없으면 시드 폴백, 데모 세이프)
      ABUSECH_AUTH_KEY: ${ABUSECH_AUTH_KEY:-}
      DATA_GO_KR_KEY: ${DATA_GO_KR_KEY:-}
    ports: ["8000:8000"]
    volumes:
      - ./apps/engine:/app
    depends_on:
      redis: { condition: service_started }
      neo4j: { condition: service_started }

  worker:
    build: ./apps/engine
    # -B: 내장 beat 로 위협 피드를 주기 수집(별도 프로세스 불필요, 단일 워커 데모용)
    command: celery -A app.worker.celery_app worker -B --loglevel=info
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: scamgraph123
      MEILI_URL: http://meilisearch:7700
      MEILI_KEY: scamgraph_dev_key
      DATABASE_URL: postgresql://scamgraph:scamgraph@postgres:5432/scamgraph
      ABUSECH_AUTH_KEY: ${ABUSECH_AUTH_KEY:-}
      DATA_GO_KR_KEY: ${DATA_GO_KR_KEY:-}
    volumes:
      - ./apps/engine:/app
    depends_on:
      redis: { condition: service_started }
      neo4j: { condition: service_started }
      postgres: { condition: service_started }

  gateway:
    build: ./apps/gateway
    environment:
      ENGINE_URL: http://engine:8000
    ports: ["8080:8080"]
    depends_on:
      engine: { condition: service_started }

  web:
    build: ./apps/web
    environment:
      NEXT_PUBLIC_GATEWAY_URL: http://localhost:8080
    ports: ["3001:3000"]
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      gateway: { condition: service_started }

  # ── 관측성(Observability) 스택 — 부가 서비스(기존 8개 서비스 동작에 영향 없음) ──
  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=6h
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports: ["9090:9090"]
    depends_on:
      gateway: { condition: service_started }
      engine: { condition: service_started }

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      # 데모 세이프: 익명 접속 허용(로그인 벽 없이 대시보드 즉시 열람). admin 계정도 유지.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: scamgraph
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_DEFAULT_THEME: dark
      GF_LOG_LEVEL: warn
    ports: ["3003:3000"]   # 호스트 3000 이 점유된 환경 대비 3003 로 매핑(web=3001)
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      prometheus: { condition: service_started }

volumes:
  pgdata:
  neo4jdata:
  meilidata:
  promdata:
  grafanadata:
