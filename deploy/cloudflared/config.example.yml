# Cloudflare 명명 터널 설정 예시 — scamgraph.eserlic.cloud
#
# 최초 1회(본인 Cloudflare 계정, eserlic.cloud 가 Cloudflare DNS 에 있어야 함):
#   cloudflared tunnel login
#   cloudflared tunnel create scamgraph          # → <TUNNEL_ID> + credentials json 생성
#   cloudflared tunnel route dns scamgraph scamgraph.eserlic.cloud
#
# 그다음 이 파일을 deploy/cloudflared/config.yml 로 복사하고 tunnel/credentials-file 을
# 실제 값으로 채운 뒤:
#   make serve          # 웹을 same-origin 모드로 기동
#   make tunnel-domain  # 명명 터널 실행 → https://scamgraph.eserlic.cloud 공개
#
# ingress 는 위→아래로 첫 매칭 규칙 적용. /api·/ws 는 게이트웨이, 나머지는 웹으로.
# (WebSocket /ws/feed 는 cloudflared 가 업그레이드를 그대로 통과시킨다.)

tunnel: <TUNNEL_ID>
credentials-file: /home/eser/.cloudflared/<TUNNEL_ID>.json

ingress:
  - hostname: scamgraph.eserlic.cloud
    path: '^/(api|ws)/'
    service: http://localhost:8080
  - hostname: scamgraph.eserlic.cloud
    service: http://localhost:3001
  - service: http_status:404
