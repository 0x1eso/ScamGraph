# ScamGraph 관측성 — 프로메테우스 스크레이프 설정
# 게이트웨이(Spring/Micrometer)와 엔진(FastAPI/prometheus_client)을 주기 수집한다.
# 도커 컴포즈 네트워크 내부 서비스명으로 접근(gateway, engine).
global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: scamgraph-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway:8080"]
        labels:
          service: gateway

  - job_name: scamgraph-engine
    metrics_path: /metrics/
    static_configs:
      - targets: ["engine:8000"]
        labels:
          service: engine

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus
